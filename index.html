<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infranettone</title>
  <meta name="description" content="Infrastructure, baked with care.">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #6f6f6f;
      --card: #f6f6f6;
      --border: #e7e7e7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.2;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 20px 64px;
      display: grid;
      gap: 36px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(32px, 6vw, 56px);
      letter-spacing: -0.03em;
    }

    .hero-image {
      width: min(420px, 100%);
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .hero-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(22px, 3.2vw, 36px);
      letter-spacing: -0.02em;
      text-align: left;
    }

    .pillars {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .pillars article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-weight: 600;
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: -0.02em;
    }

    .closing {
      text-align: center;
      display: grid;
      gap: 8px;
    }

    .closing h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.03em;
    }

    .closing p {
      margin: 0;
      color: #9a9a9a;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .repo {
      width: min(256px, 65vw);
      margin: 8px auto 0;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: block;
    }

    .repo img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 760px) {
      .pillars { grid-template-columns: 1fr; }
      .sub { text-align: center; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Infrastructure, baked with care.</h1>

    <div class="hero-image">
      <img src="./Infranettone_files/phh7atKugvgjGiBcOySZA1Mto6E.png" alt="Infranettone visual">
    </div>

    <p class="sub">Modular infrastructure, engineered with intention.</p>

    <section class="pillars" aria-label="Pillars">
      <article>Craft. Modularity.</article>
      <article>Reliability. Determinism.</article>
      <article>Simplicity. Resilience.</article>
    </section>

    <section class="closing">
      <h2>Infranettone continues.</h2>
      <p>Still baking.</p>
      <a class="repo" href="https://github.com/infranettone/infranettone-aws-ec2-deployer" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <img src="./Infranettone_files/lgYGSicU8FkEqoD3o0d07iSRo7Q.png" alt="GitHub link">
      </a>
    </section>
  </main>
</body>
</html>
